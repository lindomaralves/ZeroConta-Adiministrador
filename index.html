<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - ZeroConta</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <form id="cadastro">
    <h1>Cadastro - ZeroConta</h1>

    <input type="text" name="nome" placeholder="Nome Completo" required />
    <input type="text" name="tipo" placeholder="Tipo Usuário" required />
    <input type="text" name="cpf" placeholder="CPF / CNPJ" required />
    <input type="email" name="email" placeholder="Email" required />
    <input type="tel" name="whatsapp" placeholder="WhatsApp" required />
    <input type="text" name="endereco" placeholder="Endereço completo" required />

    <button type="submit">Cadastrar</button>
    <p id="msgRetorno"></p>
  </form>

  <script src="script.js"></script>
</body>
</html>
