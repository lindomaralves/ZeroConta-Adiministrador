<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - ZeroConta</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Cadastro - ZeroConta</h1>
    <form id="cadastroForm">
      <input type="text" name="Nome Completo" placeholder="Nome Completo" required>
      <input type="text" name="Tipo Usuário" placeholder="Tipo Usuário" required>
      <input type="text" name="CPF/CNPJ" placeholder="CPF / CNPJ" required>
      <input type="email" name="Email" placeholder="Email" required>
      <input type="tel" name="WhatsApp" placeholder="WhatsApp" required>
      <input type="text" name="Endereço" placeholder="Endereço completo" required>
      <button type="submit">Cadastrar</button>
    </form>
    <p id="resultado"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
